networks:
  audio_text_bridge:
    driver: bridge
    ipam:
      config:
        - subnet: 169.254.9.0/24

services:
  app:
    build:
      context: ./
      dockerfile: ./Dockerfile
      target: dev
    networks:
      audio_text_bridge:
        ipv4_address: 169.254.9.2
        aliases:
          - "audio-text-backend.app"
    ports:
      - 3203:3203
    volumes:
      # Only mount source code for development (not dependencies)
      - ./audio_text_backend:/app/audio_text_backend
      - ./alembic:/app/alembic
      - ./config.ini:/app/config.ini
      - /app/audio_text_backend.egg-info/
    env_file:
      - .env
    environment:
      # Prevent Python from writing .pyc files and buffer output
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      # Route Pub/Sub calls to the local emulator
      - PUBSUB_EMULATOR_HOST=audio-text-backend.pubsub:8085
    depends_on:
      postgres:
        condition: service_healthy
      pubsub-emulator:
        condition: service_started

  postgres:
    image: postgres:17.1-alpine
    networks:
      audio_text_bridge:
        ipv4_address: 169.254.9.3
        aliases:
          - "audio-text-backend.db"
    ports:
      - 5432:5432
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: audiotext
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./pgsql/init.d:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s

  pubsub-emulator:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    networks:
      audio_text_bridge:
        ipv4_address: 169.254.9.4
        aliases:
          - "audio-text-backend.pubsub"
    ports:
      - "8085:8085"
    environment:
      - CLOUDSDK_CORE_PROJECT=local-dev
    command: >
      gcloud beta emulators pubsub start --host-port=0.0.0.0:8085
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8085 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # Local worker — simulates a Cloud Run Job by pulling from the jobs
  # subscription and running transcription in-process.
  local-worker:
    build:
      context: ./
      dockerfile: ./Dockerfile
      target: dev
    networks:
      audio_text_bridge:
        ipv4_address: 169.254.9.5
        aliases:
          - "audio-text-backend.local-worker"
    volumes:
      - ./audio_text_backend:/app/audio_text_backend
      - ./config.ini:/app/config.ini
      - /app/audio_text_backend.egg-info/
    env_file:
      - .env
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - PUBSUB_EMULATOR_HOST=audio-text-backend.pubsub:8085
    depends_on:
      postgres:
        condition: service_healthy
      pubsub-emulator:
        condition: service_healthy
    command: uv run python -m audio_text_backend.cmd.local_worker

volumes:
  postgres_data:
